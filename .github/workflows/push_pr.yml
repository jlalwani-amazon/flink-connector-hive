# We need to specify repo related information here since Apache INFRA doesn't differentiate
# between several workflows with the same names while preparing a report for GHA usage
# https://infra-reports.apache.org/#ghactions
name: Flink Connector Hive CI
on: [push, pull_request, workflow_dispatch]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  compile_and_test:
    strategy:
      matrix:
        flink: [ 1.20.0 ]
        jdk: [ 8 ]
        # empty means test against hive2
        mvn_profile: [ "", hive3 ]
        include:
          - jdk: 11
            flink: 1.20.0
            mvn_profile: ""

    uses: apache/flink-connector-shared-utils/.github/workflows/ci.yml@ci_utils
    with:
      flink_version: ${{ matrix.flink }}
      jdk_version: ${{ matrix.jdk }}
      optional_maven_profiles: ${{ matrix.mvn_profile }}

  # Hive 4 requires a two-phase build to avoid a cyclic Maven dependency:
  # flink-connector-hive (hive4 profile) -> flink-connector-hive-4.0.0 -> flink-connector-hive
  # Phase 1: install the shim module (without -Phive4, so no cycle)
  # Phase 2: build and test flink-connector-hive with -Phive4 (shim resolved from local repo)
  compile_and_test_hive4:
    runs-on: ubuntu-latest
    timeout-minutes: 80
    env:
      MVN_COMMON_OPTIONS: -U -B --no-transfer-progress -Dflink.version=1.20.3
      MVN_CONNECTION_OPTIONS: -Dhttp.keepAlive=false -Dmaven.wagon.http.pool=false -Dmaven.wagon.httpconnectionManager.ttlSeconds=120
      FLINK_CACHE_DIR: "/tmp/cache/flink"
      MVN_BUILD_OUTPUT_FILE: "/tmp/mvn_build_output.out"
      MVN_VALIDATION_DIR: "/tmp/flink-validation-deployment"
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Set JDK
        uses: actions/setup-java@v5
        with:
          java-version: 11
          distribution: 'temurin'
          cache: maven

      - name: Setup Maven
        uses: stCarolas/setup-maven@v5
        with:
          maven-version: 3.8.6

      - name: Download Flink binary
        run: |
          mkdir -p ${{ env.FLINK_CACHE_DIR }}
          wget -q -c https://dlcdn.apache.org/flink/flink-1.20.3/flink-1.20.3-bin-scala_2.12.tgz -O - | tar -xz -C ${{ env.FLINK_CACHE_DIR }}

      - name: "Phase 1: Install shim module (no -Phive4, avoids cycle)"
        run: |
          mvn install -pl flink-connector-hive-4.0.0 -am -DskipTests \
            ${MVN_COMMON_OPTIONS} ${MVN_CONNECTION_OPTIONS} \
            -Dscala-2.12

      - name: "Phase 2: Build and test with Hive 4"
        timeout-minutes: 50
        run: |
          set -o pipefail

          mvn clean deploy ${MVN_COMMON_OPTIONS} \
            -DaltDeploymentRepository=validation_repository::default::file:${{ env.MVN_VALIDATION_DIR }} \
            -Dscala-2.12 \
            -Phive4 -P java11-target \
            -Prun-end-to-end-tests -DdistDir=${{ env.FLINK_CACHE_DIR }}/flink-1.20.3 \
            ${MVN_CONNECTION_OPTIONS} \
            -Dlog4j.configurationFile=file://$(pwd)/tools/ci/log4j.properties \
            | tee ${{ env.MVN_BUILD_OUTPUT_FILE }}

      - name: Check licensing
        run: |
          mvn ${MVN_COMMON_OPTIONS} exec:java@check-license -N \
            -Dexec.args="${{ env.MVN_BUILD_OUTPUT_FILE }} $(pwd) ${{ env.MVN_VALIDATION_DIR }}" \
            ${MVN_CONNECTION_OPTIONS} \
            -Dlog4j.configurationFile=file://$(pwd)/tools/ci/log4j.properties

      - name: Print JVM thread dumps when cancelled
        if: ${{ failure() }}
        run: |
          if [[ "$OSTYPE" == "linux-gnu"* ]] && command -v sudo &> /dev/null; then
            curl -s -L -o /tmp/jattach https://github.com/apangin/jattach/releases/download/v2.1/jattach
            chmod +x /tmp/jattach
            for java_pid in $(sudo pgrep java); do
              echo "----------------------- pid $java_pid -----------------------"
              echo "command line: $(sudo cat /proc/$java_pid/cmdline | xargs -0 echo)"
              sudo /tmp/jattach $java_pid jcmd "Thread.print -l"
            done
          fi
          exit 0
